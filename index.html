    function makeEmail(name, key) {
      const domain = pick(countryData[key].emailDomains);
      const parts = name.toLowerCase().replace(/[^a-z ]/g, "").trim().split(/\s+/);
      const first = parts[0] || "user";
      const last = parts[1] || "demo";
      const styles = [
        `${first}.${last}`,
        `${first}${last}${randInt(1,999)}`,
        `${first}_${last}`,
        `${first.charAt(0)}${last}${randInt(10,99)}`
      ];
      return `${pick(styles)}@${domain}`;
    }

    function avatarUrl(name, countryKey) {
      const seed = encodeURIComponent(`${countryKey}-${name}`);
      return `https://api.dicebear.com/8.x/personas/svg?seed=${seed}`;
    }

    function generateProfiles() {
      const key = countryEl.value;
      const count = Math.max(1, Math.min(20, Number(countEl.value) || 1));
      const includeEmail = includeEmailEl.value === "yes";
      const includeAddress = includeAddressEl.value === "yes";
      const c = countryData[key];

      profiles = Array.from({ length: count }, () => {
        const name = makeName();
        const address = includeAddress ? c.address() : "";
        return {
          name,
          initials: initials(name),
          avatar: avatarUrl(name, key),
          countryKey: key,
          countryFlag: c.flag,
          countryName: c.name,
          phone: c.phone(),
          email: includeEmail ? makeEmail(name, key) : "",
          address,
          mapUrl: address ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}` : ""
        };
      });

      render();
    }

    function filteredProfiles() {
      const q = searchInput.value.trim().toLowerCase();
      const countryFilter = filterCountryEl.value;
      const emailFilter = filterHasEmailEl.value;

      return profiles.filter(p => {
        const matchesQuery = !q || [
          p.name, p.phone, p.email, p.address, p.countryName
        ].join(" ").toLowerCase().includes(q);

        const matchesCountry = countryFilter === "all" || p.countryKey === countryFilter;

        const matchesEmail =
          emailFilter === "all" ||
          (emailFilter === "with-email" && !!p.email) ||
          (emailFilter === "without-email" && !p.email);

        return matchesQuery && matchesCountry && matchesEmail;
      });
    }

    function render() {
      const visible = filteredProfiles();
      resultCountEl.textContent = `${visible.length} result${visible.length === 1 ? "" : "s"}`;

      if (!visible.length) {
        resultsEl.innerHTML = `<div class="empty glass">No profiles match the current search or filter.</div>`;
        return;
      }

      resultsEl.innerHTML = visible.map((p, i) => `
        <div class="card glass" style="animation-delay:${i * 0.04}s">
          <div class="card-top">
            <div class="avatar-wrap">
              <div class="avatar-ring"></div>
              <div class="avatar">
                <img src="${p.avatar}" alt="${p.name}" onerror="this.style.display='none'; this.parentNode.innerHTML='<div class=&quot;avatar-fallback&quot;>${p.initials}</div>';">
              </div>
            </div>
            <div>
              <div class="name">${p.name}</div>
              <div class="country">${p.countryFlag} ${p.countryName}</div>
            </div>
          </div>

          <div class="chip-row">
            <div class="chip">Premium card</div>
            <div class="chip">Demo profile</div>
          </div>

          <div class="row"><strong>Phone</strong> ${p.phone}</div>
          ${p.email ? `<div class="row"><strong>Email</strong> ${p.email}</div>` : ""}
          ${p.address ? `<div class="row"><strong>Address</strong> ${p.address}</div>` : ""}

          <div class="actions">
            <button class="mini" onclick="copyOne(${profiles.indexOf(p)})">Copy</button>
            ${p.email ? `<a class="mini" href="mailto:${p.email}">Email</a>` : ""}
            ${p.address ? `<a class="mini" href="${p.mapUrl}" target="_blank" rel="noopener noreferrer">Map</a>` : ""}
          </div>
        </div>
      `).join("");
    }

    function formatProfile(p) {
      return [
        p.name,
        `Country: ${p.countryFlag} ${p.countryName}`,
        `Phone: ${p.phone}`,
        p.email ? `Email: ${p.email}` : "",
        p.address ? `Address: ${p.address}` : "",
        p.mapUrl ? `Map: ${p.mapUrl}` : ""
      ].filter(Boolean).join("\n");
    }

    async function copyOne(index) {
      const p = profiles[index];
      if (!p) return;
      try {
        await navigator.clipboard.writeText(formatProfile(p));
      } catch {
        alert("Copy failed.");
      }
    }

    async function copyAll() {
      const visible = filteredProfiles();
      if (!visible.length) {
        alert("Nothing to copy.");
        return;
      }

      try {
        await navigator.clipboard.writeText(
          visible.map(formatProfile).join("\n\n--------------------\n\n")
        );
      } catch {
        alert("Copy failed.");
      }
    }

    function escCSV(v) {
      return `"${String(v ?? "").replace(/"/g, '""')}"`;
    }

    function downloadCSV() {
      const visible = filteredProfiles();
      if (!visible.length) {
        alert("Nothing to download.");
        return;
      }

      const rows = [
        ["Name","Country","Phone","Email","Address","Map URL"],
        ...visible.map(p => [p.name, `${p.countryFlag} ${p.countryName}`, p.phone, p.email, p.address, p.mapUrl])
      ];

      const csv = rows.map(r => r.map(escCSV).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `premium-fake-contacts-${new Date().toISOString().slice(0,19).replace(/[:T]/g,"-")}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    initTheme();
    initCountryFilter();
    generateProfiles();

    window.copyOne = copyOne;
  </script>
</body>
</html>
